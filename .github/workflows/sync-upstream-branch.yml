name: Sync origin/upstream from anthropics/main

on:
  schedule:
    - cron: '0 4 * * *'  # daily at 04:00 UTC
  workflow_dispatch:  # manual trigger from Actions tab

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: upstream
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward upstream branch from anthropics/main
        run: |
          git remote add anthropics https://github.com/anthropics/claude-plugins-official.git
          # Full fetch — shallow (--depth=1) prevents finding shared ancestor
          # and causes "refusing to merge unrelated histories" failures.
          git fetch anthropics main
          # --ff-only fails loudly if upstream history was rewritten (shouldn't happen).
          # That failure is the correct behavior — manual investigation needed.
          git merge --ff-only anthropics/main
          git push origin upstream

      - name: Report
        if: always()
        run: |
          echo "=== upstream branch HEAD after sync ==="
          git log -1 --oneline
